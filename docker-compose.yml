services:

  postgres:
    image: postgres:17

    container_name: netops-postgres

    restart: unless-stopped

    environment:
      POSTGRES_DB: netops
      POSTGRES_USER: netops
      POSTGRES_PASSWORD: netops123

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
